name: Style

# Prose gate (no em-dashes / en-dashes) over jhheider/rust-ci. Self-hosted
# because this is a private repo.
on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  style:
    uses: jhheider/rust-ci/.github/workflows/style.yml@v1
    with:
      runs-on: self-hosted
