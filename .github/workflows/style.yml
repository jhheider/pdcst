name: Style

# Prose gate (no em-dashes / en-dashes) over jhheider/rust-ci. Public repo, so
# it runs on the free hosted runner.
on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  style:
    uses: jhheider/rust-ci/.github/workflows/style.yml@v1
