name: CI

# Thin caller over jhheider/rust-ci (see that repo's README). Private repo, so
# everything routes to the self-hosted arm64 runner (studio-pdcst). rodio needs
# ALSA headers at build time, so that runner's image carries libasound2-dev +
# pkg-config (see jhheider/gha-runner images/pdcst); the stock hosted runners
# would need an apt step this thin caller does not provide.
on:
  push:
    branches: [main]
    paths-ignore: ["**.md", "LICENSE*", ".gitignore"]
  pull_request:
    paths-ignore: ["**.md", "LICENSE*", ".gitignore"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    uses: jhheider/rust-ci/.github/workflows/ci.yml@v1
    with:
      os: '["self-hosted"]'
      runs-on: self-hosted
      coverage: true
    secrets: inherit
