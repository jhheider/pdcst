name: CI

# Thin caller over jhheider/rust-ci (see that repo's README). Public repo, so
# everything runs on free hosted runners. rodio needs ALSA headers to build on
# Linux, installed via the `system-packages` input (rust-ci v1.5.0+); macOS uses
# CoreAudio (no dep). The matrix is Linux + macOS to match the shipped targets;
# Windows is not built.
on:
  push:
    branches: [main]
    paths-ignore: ["**.md", "LICENSE*", ".gitignore"]
  pull_request:
    paths-ignore: ["**.md", "LICENSE*", ".gitignore"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    uses: jhheider/rust-ci/.github/workflows/ci.yml@v1
    with:
      os: '["ubuntu-latest","macos-latest"]'
      coverage: true
      system-packages: "libasound2-dev pkg-config"
    secrets: inherit
