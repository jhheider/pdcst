name: Release

# Thin caller over jhheider/rust-ci release.yml. On a published GitHub Release:
# build the pdcst binaries and attach them, publish ONLY the wsola crate to
# crates.io (pdcst itself is not published yet), and refresh the Homebrew formula
# in the tap.
on:
  release:
    types: [published]

# The reusable build job attaches assets to the release.
permissions:
  contents: write

jobs:
  release:
    uses: jhheider/rust-ci/.github/workflows/release.yml@v1
    with:
      bin-name: pdcst
      # Linux is glibc (x86_64-unknown-linux-gnu, dynamic libasound), not musl:
      # rodio/ALSA cannot statically link cleanly. macOS uses CoreAudio, no dep.
      # Windows is not shipped.
      targets: |
        {"include": [
          {"os":"ubuntu-latest","target":"x86_64-unknown-linux-gnu","asset":"pdcst-linux-x86_64.tar.gz"},
          {"os":"macos-latest","target":"aarch64-apple-darwin","asset":"pdcst-macos-aarch64.tar.gz"},
          {"os":"macos-latest","target":"x86_64-apple-darwin","asset":"pdcst-macos-x86_64.tar.gz"}
        ]}
      system-packages: "libasound2-dev pkg-config"
      include-files: "README.md LICENSE"
      # Publish only wsola (the standalone, generally-useful crate). pdcst is a
      # personal tool, not ready for crates.io; the publish-crates action skips
      # any version already on the registry, so re-running is safe.
      publish-crates: true
      crates: "wsola"
      tap-repo: jhheider/homebrew-tap
      tap-formula: Formula/pdcst.rb
    secrets: inherit
